name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Build Windows installer
        run: bunx electron-builder --win --config --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## povo プロモコード管理 v${{ steps.version.outputs.version }}

            ### ダウンロード

            下の「Assets」セクションから `povo-promo-code-notify-${{ steps.version.outputs.version }}-setup.exe` をダウンロードしてください。

            ### インストール方法

            1. ダウンロードしたインストーラーを実行
            2. インストールウィザードに従ってインストール
            3. デスクトップまたはスタートメニューからアプリを起動

            ### 変更内容

            詳細は [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/main/docs/RELEASE_NOTES.md) を参照してください。
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
